<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: transparent; font-family: 'Outfit', sans-serif; }

  .agenda-container { background: #212b5a; border-radius: 20px; overflow: visible; box-shadow: 0 20px 50px rgba(33,43,90,0.15); color: #fff; }
  .day-nav { display: flex; background: rgba(0,0,0,0.2); border-radius: 20px 20px 0 0; }
  .day-btn { flex: 1; padding: 20px; border: none; background: transparent; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; color: rgba(255,255,255,0.5); transition: 0.2s; }
  .day-btn.active { color: #fff; background: rgba(255,255,255,0.05); position: relative; }
  .day-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #b11116; }

  .accordion-item { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .accordion-header { width: 100%; padding: 18px 20px; display: grid; grid-template-columns: 75px 1fr 24px; align-items: start; cursor: pointer; background: none; border: none; text-align: left; font-family: 'Outfit', sans-serif; gap: 10px; }
  .acc-time { font-weight: 700; color: #ff5e62; font-size: 13px; letter-spacing: 0.5px; padding-top: 3px; }
  .acc-header-content { display: flex; flex-direction: column; gap: 3px; }
  .acc-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ff5e62; opacity: 0.8; }
  .acc-title { font-weight: 700; color: #fff; font-size: 15px; line-height: 1.4; }
  .acc-icon { font-size: 22px; color: rgba(255,255,255,0.4); transition: transform 0.2s ease; padding-top: 2px; }

  .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: rgba(0,0,0,0.15); }
  .content-inner { padding: 16px 20px 20px 105px; }
  .accordion-item.is-open .acc-icon { transform: rotate(45deg); color: #ff5e62; }
  .accordion-item.is-open .accordion-content { max-height: 2000px; }

  .acc-description { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin-bottom: 12px; white-space: pre-line; }
  .acc-speaker { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 16px; white-space: pre-line; }
  .acc-speaker strong { color: #e2e8f0; display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }

  .sponsor-box { border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 4px; }
  .sponsor-row { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); transition: background 0.2s ease; cursor: default; }
  .sponsor-row:last-child { border-bottom: none; }
  .sponsor-row:hover { background: rgba(177,17,22,0.2); }
  .sponsor-row-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ff5e62; margin-bottom: 5px; }
  .sponsor-row-content { font-size: 13px; color: #cbd5e1; line-height: 1.6; white-space: pre-line; }

  .msg { padding: 40px; text-align: center; color: rgba(255,255,255,0.4); font-family: 'Outfit', sans-serif; }
</style>
</head>
<body>
<div class="agenda-container" id="agendaContainer">
  <div class="day-nav">
    <button id="btn-day1" class="day-btn active" onclick="switchDay('day1')">Day 1: 26 Aug</button>
    <button id="btn-day2" class="day-btn" onclick="switchDay('day2')">Day 2: 27 Aug</button>
  </div>
  <div id="day1" class="agenda-day" style="display:block;"><div class="msg">Loading...</div></div>
  <div id="day2" class="agenda-day" style="display:none;"><div class="msg">Loading...</div></div>
</div>

<script>
  var DAY1_SHEET = 'Day 1: 26 August';
  var DAY2_SHEET = 'Day 2: 27 August';
  var BASE_URL   = 'https://sheetdb.io/api/v1/aii6pr8cqy9d1';

  function sendHeight() {
    var h = document.getElementById('agendaContainer').scrollHeight;
    window.parent.postMessage({ iframeHeight: h }, '*');
  }

  function makeSponsorBox(g, h, i) {
    if (!g && !h && !i) return '';
    var rows = [
      { label: 'X',             content: g },
      { label: 'Session Chair', content: h },
      { label: 'Gold +',        content: i }
    ].filter(function(r) { return r.content; });
    if (rows.length === 0) return '';
    var html = '<div class="sponsor-box">';
    rows.forEach(function(r) {
      html += '<div class="sponsor-row">'
            + '<div class="sponsor-row-label">' + r.label + '</div>'
            + '<div class="sponsor-row-content">' + r.content.replace(/\n/g, '<br>') + '</div>'
            + '</div>';
    });
    return html + '</div>';
  }

  function buildHTML(rows) {
    var html = '';
    rows.forEach(function(row) {
      // Exact headers: A=Time, B=Session(eyebrow), C=Format(skip),
      // D=Session Title(main), E=Description, F=speaker, G=x, H=Session Chair, I=Gold+
      var time  = (row['Time']          || '').trim();
      var eye   = (row['Session']       || '').trim();
      var title = (row['Session Title'] || '').trim();
      var desc  = (row['Description']   || '').trim();
      var spk   = (row['speaker']       || '').trim();
      var g     = (row['x']             || '').trim();
      var h     = (row['Session Chair'] || '').trim();
      var i     = (row['Gold +']        || '').trim();

      if (!time && !title) return;

      var sponsorHtml = makeSponsorBox(g, h, i);
      var bodyHtml = '';
      if (desc)        bodyHtml += '<div class="acc-description">' + desc.replace(/\n/g, '<br>') + '</div>';
      if (spk)         bodyHtml += '<div class="acc-speaker"><strong>Speakers</strong>' + spk.replace(/\n/g, '<br>') + '</div>';
      if (sponsorHtml) bodyHtml += sponsorHtml;

      var hasContent = bodyHtml.length > 0;

      html += '<div class="accordion-item">'
            + '<button class="accordion-header"'
            + (hasContent ? ' onclick="toggleAcc(this)"' : ' style="cursor:default;"') + '>'
            + '<span class="acc-time">' + time + '</span>'
            + '<div class="acc-header-content">'
            + (eye ? '<span class="acc-eyebrow">' + eye + '</span>' : '')
            + '<span class="acc-title">' + (title || '—') + '</span>'
            + '</div>'
            + '<span class="acc-icon" style="' + (!hasContent ? 'opacity:0;' : '') + '">+</span>'
            + '</button>'
            + '<div class="accordion-content"><div class="content-inner">' + bodyHtml + '</div></div>'
            + '</div>';
    });
    return html || '<div class="msg">No sessions found.</div>';
  }

  function loadDay(sheet, elementId) {
    var el = document.getElementById(elementId);
    fetch(BASE_URL + '?sheet=' + encodeURIComponent(sheet))
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        el.innerHTML = buildHTML(rows);
        sendHeight();
      })
      .catch(function() {
        el.innerHTML = '<div class="msg" style="color:#ff5e62;">Failed to load. Please refresh.</div>';
        sendHeight();
      });
  }

  function switchDay(id) {
    document.querySelectorAll('.agenda-day').forEach(function(d) { d.style.display = 'none'; });
    document.querySelectorAll('.day-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById(id).style.display = 'block';
    document.getElementById(id === 'day1' ? 'btn-day1' : 'btn-day2').classList.add('active');
    sendHeight();
  }

  function toggleAcc(btn) {
    var item = btn.parentElement;
    var isOpen = item.classList.contains('is-open');
    document.querySelectorAll('.accordion-item').forEach(function(i) { i.classList.remove('is-open'); });
    if (!isOpen) item.classList.add('is-open');
    setTimeout(sendHeight, 450);
  }

  loadDay(DAY1_SHEET, 'day1');
  loadDay(DAY2_SHEET, 'day2');
</script>
</body>
</html>
